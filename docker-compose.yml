services:

  api:
    build: .                         
    ports:
      - "3000:3000"                   
    environment:
      DB_HOST: db                     
      DB_USER: root                  
      DB_PASS: MyS3cur3P@ss       
      DB_NAME: todo_db
    depends_on:
      db:
        condition: service_healthy    
    restart: on-failure

  
  db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: MyS3cur3P@ss
      MYSQL_DATABASE: todo_db
    ports:
      - "3306:3306"                   
    volumes:
      - db_data:/var/lib/mysql                         
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql  
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:    
